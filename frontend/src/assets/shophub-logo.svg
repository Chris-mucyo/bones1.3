<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120" fill="none">
  <!--
    ShopHub Logo — Adaptive Edition
    - Transparent background
    - All elements use #22C55E (green) so they remain visible on ANY background
    - Drop shadow adds depth on light AND dark surfaces
    - No white fills, no black fills — purely green strokes/text on transparent
  -->

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#22C55E" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════ -->
  <!--        ICON MARK               -->
  <!-- ═══════════════════════════════ -->

  <!-- Storefront arch top -->
  <path d="M16 44 Q16 28 32 28 L80 28 Q96 28 96 44"
    stroke="#22C55E" stroke-width="3.5" stroke-linecap="round" fill="none" filter="url(#shadow)"/>

  <!-- Top bar -->
  <line x1="12" y1="44" x2="100" y2="44"
    stroke="#22C55E" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center door -->
  <rect x="46" y="60" width="20" height="28" rx="3"
    stroke="#22C55E" stroke-width="2.8" fill="none"/>

  <!-- Left window -->
  <rect x="20" y="54" width="18" height="14" rx="2.5"
    stroke="#22C55E" stroke-width="2.5" fill="none"/>

  <!-- Right window -->
  <rect x="74" y="54" width="18" height="14" rx="2.5"
    stroke="#22C55E" stroke-width="2.5" fill="none"/>

  <!-- Ground line -->
  <line x1="10" y1="88" x2="102" y2="88"
    stroke="#22C55E" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Grid dots — commerce cue -->
  <circle cx="88" cy="30" r="2.2" fill="#22C55E" opacity="0.4"/>
  <circle cx="95" cy="30" r="2.2" fill="#22C55E" opacity="0.4"/>
  <circle cx="88" cy="23" r="2.2" fill="#22C55E" opacity="0.4"/>
  <circle cx="95" cy="23" r="2.2" fill="#22C55E" opacity="0.4"/>

  <!-- Divider rule -->
  <line x1="112" y1="34" x2="112" y2="86"
    stroke="#22C55E" stroke-width="1" opacity="0.2"/>

  <!-- ═══════════════════════════════ -->
  <!--        WORDMARK                -->
  <!-- ═══════════════════════════════ -->

  <!-- "Shop" semibold -->
  <text
    x="122" y="72"
    font-family="'Raleway', 'Trebuchet MS', sans-serif"
    font-size="46"
    font-weight="600"
    letter-spacing="-0.5"
    fill="#22C55E"
  >Shop</text>

  <!-- "Hub" light -->
  <text
    x="272" y="72"
    font-family="'Raleway', 'Trebuchet MS', sans-serif"
    font-size="46"
    font-weight="300"
    letter-spacing="1"
    fill="#22C55E"
    opacity="0.88"
  >Hub</text>

  <!-- Tagline -->
  <text
    x="122" y="92"
    font-family="'Raleway', 'Trebuchet MS', sans-serif"
    font-size="10.5"
    font-weight="400"
    letter-spacing="4.5"
    fill="#22C55E"
    opacity="0.5"
  >MARKETPLACE</text>

</svg>
